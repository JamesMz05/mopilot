# Nginx-Konfiguration für zeo-kunden.mopilot.website
# Als Subdomain des Hauptprojekts mopilot.website auf demselben Hetzner-Server
# Bei Nutzung von Coolify: Diese Konfiguration dient als Referenz.
# Coolify übernimmt die Reverse-Proxy-Konfiguration automatisch.

server {
    listen 80;
    server_name zeo-kunden.mopilot.website;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zeo-kunden.mopilot.website;

    # SSL (Certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/zeo-kunden.mopilot.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeo-kunden.mopilot.website/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Backend API (FastAPI)
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # SSE: disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
