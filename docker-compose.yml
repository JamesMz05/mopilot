services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.mopilot.website
    environment:
      - NEXT_PUBLIC_API_URL=https://api.mopilot.website
      - NEXT_PUBLIC_SITE_URL=https://mopilot.website
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - mopilot-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://mopilot:mopilot_secret_2026@postgres:5432/mopilot}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-placeholder}
      - SECRET_KEY=${SECRET_KEY:-mopilot-jwt-secret-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://mopilot.website,https://api.mopilot.website}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mopilot-net

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mopilot
      - POSTGRES_USER=mopilot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mopilot_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mopilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mopilot-net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mopilot-net

volumes:
  postgres_data:
  redis_data:

networks:
  mopilot-net:
    driver: bridge
