  <rect x="60" y="162" width="260" height="155" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#E0E0E0" stroke-width="0.5"/>
  <rect x="60" y="162" width="260" height="32" rx="10" fill="#1E88E5"/>
  <rect x="60" y="180" width="260" height="14" fill="#1E88E5"/>
