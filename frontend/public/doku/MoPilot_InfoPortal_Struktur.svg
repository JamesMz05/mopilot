  <ellipse cx="62" cy="56" rx="8" ry="16" fill="none" stroke="#64B5F6" stroke-width="1"/>
  <line x1="46" y1="56" x2="78" y2="56" stroke="#64B5F6" stroke-width="1"/>
  <line x1="49" y1="46" x2="75" y2="46" stroke="#64B5F6" stroke-width="0.7"/>
  <line x1="49" y1="66" x2="75" y2="66" stroke="#64B5F6" stroke-width="0.7"/>

