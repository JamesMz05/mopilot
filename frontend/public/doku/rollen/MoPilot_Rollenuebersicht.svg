<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <!-- Zone backgrounds -->
    <linearGradient id="customerZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C8E6C9" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="operatorZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="orgZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFE0B2" stop-opacity="0.5"/>
    </linearGradient>
    
    <!-- Card shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLg" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000030"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#66BB6A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#42A5F5"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFA726"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" fill="#FAFBFC" rx="0"/>
  
  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1A237E" letter-spacing="0.5">MoPilot – Rollenübersicht und Beziehungen</text>
  <text x="600" y="65" text-anchor="middle" font-size="12" fill="#78909C" letter-spacing="1">KI-BASIERTER ASSISTENT FÜR NACHHALTIGE MOBILITÄT</text>

  <!-- ==================== ZONE 1: KUNDENNAH (green) ==================== -->
  <rect x="30" y="85" width="370" height="720" rx="16" fill="url(#customerZone)" stroke="#A5D6A7" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="215" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32" letter-spacing="1.5">KUNDENNAH</text>

  <!-- Endkunde (prominent) -->
  <rect x="60" y="175" width="310" height="90" rx="12" fill="#FFFFFF" filter="url(#shadowLg)" stroke="#43A047" stroke-width="2"/>
  <circle cx="95" cy="220" r="22" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="95" y="215" text-anchor="middle" font-size="18">👤</text>
  <text x="95" y="232" text-anchor="middle" font-size="7" fill="#388E3C" font-weight="600">1</text>
  <text x="130" y="207" font-size="15" font-weight="700" fill="#1B5E20">Endkunde</text>
  <text x="130" y="225" font-size="10" fill="#558B2F">Carsharing optimal und entspannt</text>
  <text x="130" y="240" font-size="10" fill="#558B2F">nutzen</text>

  <!-- Stationspate -->
  <rect x="60" y="310" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#81C784" stroke-width="1.5"/>
  <circle cx="95" cy="352" r="18" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="95" y="348" text-anchor="middle" font-size="15">🏘️</text>
  <text x="95" y="362" text-anchor="middle" font-size="7" fill="#388E3C" font-weight="600">8</text>
  <text x="125" y="339" font-size="13" font-weight="600" fill="#2E7D32">Stationspate</text>
  <text x="125" y="356" font-size="9.5" fill="#4E7D50">Entwicklung der Kundenbasis vor Ort –</text>
  <text x="125" y="370" font-size="9.5" fill="#4E7D50">insbesondere beim Onboarding</text>
  
  <!-- Hotline/Kundenservice -->
  <rect x="60" y="415" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#81C784" stroke-width="1.5"/>
  <circle cx="95" cy="457" r="18" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="95" y="453" text-anchor="middle" font-size="15">📞</text>
  <text x="95" y="467" text-anchor="middle" font-size="7" fill="#388E3C" font-weight="600">4</text>
  <text x="125" y="444" font-size="13" font-weight="600" fill="#2E7D32">Hotline / Kundenservice</text>
  <text x="125" y="461" font-size="9.5" fill="#4E7D50">Unterstützung bei der Fahrzeugnutzung;</text>
  <text x="125" y="475" font-size="9.5" fill="#4E7D50">Beantworten von Kundenanliegen</text>

  <!-- Validierungsstelle -->
  <rect x="60" y="520" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#81C784" stroke-width="1.5"/>
  <circle cx="95" cy="562" r="18" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="95" y="558" text-anchor="middle" font-size="15">✅</text>
  <text x="95" y="572" text-anchor="middle" font-size="7" fill="#388E3C" font-weight="600">10</text>
  <text x="125" y="549" font-size="13" font-weight="600" fill="#2E7D32">Validierungsstelle</text>
  <text x="125" y="566" font-size="9.5" fill="#4E7D50">Führerscheinprüfung,</text>
  <text x="125" y="580" font-size="9.5" fill="#4E7D50">Kundeninformation</text>

  <!-- ==================== ZONE 2: BETRIEB (blue) ==================== -->
  <rect x="420" y="85" width="360" height="720" rx="16" fill="url(#operatorZone)" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="600" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0" letter-spacing="1.5">BETRIEB &amp; PLATTFORM</text>

  <!-- Betreiber (central, prominent) -->
  <rect x="445" y="260" width="310" height="110" rx="12" fill="#FFFFFF" filter="url(#shadowLg)" stroke="#1E88E5" stroke-width="2.5"/>
  <rect x="445" y="260" width="310" height="32" rx="12" fill="#1E88E5"/>
  <rect x="445" y="278" width="310" height="14" fill="#1E88E5"/>
  <text x="600" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" letter-spacing="0.5">ZENTRALE ROLLE</text>
  <circle cx="480" cy="330" r="22" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="480" y="326" text-anchor="middle" font-size="18">🏢</text>
  <text x="480" y="343" text-anchor="middle" font-size="7" fill="#1565C0" font-weight="600">3</text>
  <text x="515" y="313" font-size="15" font-weight="700" fill="#0D47A1">Betreiber</text>
  <text x="515" y="331" font-size="9.5" fill="#37699E">Durchführung des Sharing-Betriebs;</text>
  <text x="515" y="345" font-size="9.5" fill="#37699E">Gestaltung der Abläufe; Vertragspartner</text>
  <text x="515" y="359" font-size="9.5" fill="#37699E">für Endkunden, Projektträger, Fahrzeugsteller</text>

  <!-- Plattform-Support -->
  <rect x="445" y="145" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#64B5F6" stroke-width="1.5"/>
  <circle cx="480" cy="187" r="18" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.2"/>
  <text x="480" y="183" text-anchor="middle" font-size="15">🛠️</text>
  <text x="480" y="197" text-anchor="middle" font-size="7" fill="#1565C0" font-weight="600">2</text>
  <text x="510" y="175" font-size="13" font-weight="600" fill="#1565C0">Plattform-Support</text>
  <text x="510" y="192" font-size="9.5" fill="#37699E">Unterstützung der Betreiber</text>
  <text x="510" y="206" font-size="9.5" fill="#37699E">bei der Plattformnutzung</text>

  <!-- Fahrzeugbetreuer -->
  <rect x="445" y="420" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#64B5F6" stroke-width="1.5"/>
  <circle cx="480" cy="462" r="18" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.2"/>
  <text x="480" y="458" text-anchor="middle" font-size="15">🔧</text>
  <text x="480" y="472" text-anchor="middle" font-size="7" fill="#1565C0" font-weight="600">9</text>
  <text x="510" y="449" font-size="13" font-weight="600" fill="#1565C0">Fahrzeugbetreuer</text>
  <text x="510" y="466" font-size="9.5" fill="#37699E">Organisation von Fahrzeugreinigung,</text>
  <text x="510" y="480" font-size="9.5" fill="#37699E">Wartung, Reparatur</text>

  <!-- Flottenmanagement -->
  <rect x="445" y="535" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#64B5F6" stroke-width="1.5"/>
  <circle cx="480" cy="577" r="18" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.2"/>
  <text x="480" y="573" text-anchor="middle" font-size="15">🚗</text>
  <text x="480" y="587" text-anchor="middle" font-size="7" fill="#1565C0" font-weight="600">5</text>
  <text x="510" y="564" font-size="13" font-weight="600" fill="#1565C0">Flottenmanagement</text>
  <text x="510" y="581" font-size="9.5" fill="#37699E">Management der stations- und</text>
  <text x="510" y="595" font-size="9.5" fill="#37699E">fahrzeugbezogenen Prozesse</text>

  <!-- ==================== ZONE 3: ORGANISATION (orange) ==================== -->
  <rect x="800" y="85" width="370" height="720" rx="16" fill="url(#orgZone)" stroke="#FFCC80" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="985" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100" letter-spacing="1.5">STRATEGIE &amp; BEREITSTELLUNG</text>

  <!-- Projektträger -->
  <rect x="830" y="215" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#FFB74D" stroke-width="1.5"/>
  <circle cx="865" cy="257" r="18" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="865" y="253" text-anchor="middle" font-size="15">🎯</text>
  <text x="865" y="267" text-anchor="middle" font-size="7" fill="#E65100" font-weight="600">6</text>
  <text x="895" y="244" font-size="13" font-weight="600" fill="#E65100">Projektträger</text>
  <text x="895" y="261" font-size="9.5" fill="#A16222">Projektstrategie,</text>
  <text x="895" y="275" font-size="9.5" fill="#A16222">Projektentwicklung</text>

  <!-- Fahrzeugsteller -->
  <rect x="830" y="330" width="310" height="85" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#FFB74D" stroke-width="1.5"/>
  <circle cx="865" cy="372" r="18" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="865" y="368" text-anchor="middle" font-size="15">🏭</text>
  <text x="865" y="382" text-anchor="middle" font-size="7" fill="#E65100" font-weight="600">7</text>
  <text x="895" y="359" font-size="13" font-weight="600" fill="#E65100">Fahrzeugsteller</text>
  <text x="895" y="376" font-size="9.5" fill="#A16222">Fahrzeugbereitstellung,</text>
  <text x="895" y="390" font-size="9.5" fill="#A16222">Fahrzeugmanagement</text>

  <!-- ==================== CONNECTION LINES ==================== -->
  
  <!-- Endkunde → Stationspate -->
  <line x1="215" y1="265" x2="215" y2="310" stroke="#66BB6A" stroke-width="2" stroke-dasharray="5 3"/>
  
  <!-- Endkunde → Hotline -->
  <line x1="215" y1="265" x2="215" y2="415" stroke="#66BB6A" stroke-width="2" stroke-dasharray="5 3"/>
  
  <!-- Endkunde → Validierung -->
  <line x1="215" y1="265" x2="215" y2="520" stroke="#66BB6A" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Endkunde → Betreiber (cross-zone) -->
  <path d="M 370 220 Q 410 220 445 290" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-dasharray="8 4" marker-end="url(#arrowBlue)"/>
  <rect x="383" y="237" width="60" height="16" rx="4" fill="#FFFFFF" stroke="#90CAF9" stroke-width="0.5"/>
  <text x="413" y="249" text-anchor="middle" font-size="8" fill="#1565C0">Vertrag</text>

  <!-- Plattform-Support → Betreiber -->
  <line x1="600" y1="230" x2="600" y2="260" stroke="#42A5F5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Betreiber → Fahrzeugbetreuer -->
  <line x1="600" y1="370" x2="600" y2="420" stroke="#42A5F5" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Betreiber → Flottenmanagement -->
  <line x1="600" y1="370" x2="600" y2="535" stroke="#42A5F5" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Betreiber → Projektträger (cross-zone) -->
  <path d="M 755 300 Q 795 280 830 257" stroke="#1E88E5" stroke-width="2.5" fill="none" stroke-dasharray="8 4" marker-end="url(#arrowOrange)"/>
  <rect x="770" y="263" width="60" height="16" rx="4" fill="#FFFFFF" stroke="#FFCC80" stroke-width="0.5"/>
  <text x="800" y="275" text-anchor="middle" font-size="8" fill="#E65100">Strategie</text>

  <!-- Betreiber → Fahrzeugsteller (cross-zone) -->
  <path d="M 755 340 Q 795 350 830 365" stroke="#1E88E5" stroke-width="2.5" fill="none" stroke-dasharray="8 4" marker-end="url(#arrowOrange)"/>
  <rect x="770" y="340" width="65" height="16" rx="4" fill="#FFFFFF" stroke="#FFCC80" stroke-width="0.5"/>
  <text x="803" y="352" text-anchor="middle" font-size="8" fill="#E65100">Fahrzeuge</text>

  <!-- Hotline → Betreiber -->
  <path d="M 370 457 Q 410 440 445 350" stroke="#66BB6A" stroke-width="2" fill="none" stroke-dasharray="6 3" marker-end="url(#arrowBlue)"/>

  <!-- Flottenmanagement → Fahrzeugsteller -->
  <path d="M 755 577 Q 810 530 860 415" stroke="#42A5F5" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>


  <!-- ==================== LEGEND ==================== -->
  <rect x="60" y="660" width="310" height="120" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#E0E0E0" stroke-width="1"/>
  <text x="80" y="682" font-size="11" font-weight="700" fill="#37474F">Legende</text>
  
  <rect x="80" y="695" width="28" height="12" rx="3" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="118" y="705" font-size="9.5" fill="#546E7A">Kundennah – direkter Kontakt zum Endkunden</text>
  
  <rect x="80" y="717" width="28" height="12" rx="3" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="118" y="727" font-size="9.5" fill="#546E7A">Betrieb &amp; Plattform – operative Rollen</text>
  
  <rect x="80" y="739" width="28" height="12" rx="3" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="118" y="749" font-size="9.5" fill="#546E7A">Strategie &amp; Bereitstellung – übergeordnete Rollen</text>
  
  <line x1="80" y1="765" x2="108" y2="765" stroke="#78909C" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="118" y="769" font-size="9.5" fill="#546E7A">Beziehung / Zusammenarbeit</text>

  <!-- MoPilot KI badge -->
  <rect x="830" y="660" width="310" height="120" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="830" y="660" width="310" height="30" rx="10" fill="#1A237E"/>
  <rect x="830" y="678" width="310" height="12" fill="#1A237E"/>
  <text x="985" y="680" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" letter-spacing="1">🤖  MoPilot KI-ASSISTENT</text>
  <text x="850" y="710" font-size="9.5" fill="#546E7A">Der KI-Assistent unterstützt alle Rollen</text>
  <text x="850" y="725" font-size="9.5" fill="#546E7A">kontextabhängig mit Informationen aus:</text>
  <text x="860" y="743" font-size="9" fill="#37474F">▸ Info Portal  ▸ Projektwebseite</text>
  <text x="860" y="758" font-size="9" fill="#37474F">▸ Ticketsystem  ▸ Admin Center</text>
  <text x="860" y="773" font-size="9" fill="#37474F">▸ Umgebungsinformationen</text>

  <!-- Footer -->
  <text x="600" y="830" text-anchor="middle" font-size="9" fill="#B0BEC5">MoPilot – Rollen und Datenquellen │ Stand: 26.02.2026</text>
</svg>
